openapi: 3.0.3
info:
  title: Workshop Spring Boot API
  version: 1.0.0
  description: Contrato publico del workshop Spring Boot 3.x.
  contact:
    name: Jorge Mario Cano Cobon
    email: jcanoc5@miumg.edu.gt
tags:
  - name: workshop
    description: Endpoints principales del taller
  - name: simulaciones
    description: Endpoints de simulaciones de negocio
  - name: demo-estado
    description: Comparacion de estado singleton y manual
paths:
  /api/v1:
    get:
      tags:
        - workshop
      operationId: getWorkshopHealth
      responses:
        '200':
          description: Estado del workshop
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkshopHealthResponse'
  /api/v1/saludos:
    get:
      tags:
        - workshop
      operationId: saludarPorGet
      parameters:
        - name: nombre
          in: query
          required: false
          schema:
            type: string
            default: Mundo
      responses:
        '200':
          description: Saludo generado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaludoResponse'
    post:
      tags:
        - workshop
      operationId: saludarPorPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaludoRequest'
      responses:
        '200':
          description: Saludo generado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaludoResponse'
        '400':
          description: Error de validacion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/simulaciones/prestamo:
    post:
      tags:
        - simulaciones
      operationId: simularPrestamo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrestamoRequest'
      responses:
        '200':
          description: Resultado de la simulacion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrestamoResponse'
        '400':
          description: Error de validacion o regla de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/demo/estado/singleton/{valor}:
    post:
      tags:
        - demo-estado
      operationId: actualizarSingleton
      parameters:
        - $ref: '#/components/parameters/ValorPath'
      responses:
        '200':
          description: Estado singleton actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstadoResponse'
  /api/v1/demo/estado/singleton:
    get:
      tags:
        - demo-estado
      operationId: obtenerSingleton
      responses:
        '200':
          description: Estado singleton actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstadoResponse'
  /api/v1/demo/estado/singleton/reset:
    post:
      tags:
        - demo-estado
      operationId: reiniciarSingleton
      responses:
        '200':
          description: Estado singleton reiniciado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstadoResponse'
  /api/v1/demo/estado/manual/{valor}:
    post:
      tags:
        - demo-estado
      operationId: actualizarManual
      parameters:
        - $ref: '#/components/parameters/ValorPath'
      responses:
        '200':
          description: Estado manual actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstadoResponse'
  /api/v1/demo/estado/manual:
    get:
      tags:
        - demo-estado
      operationId: obtenerManual
      responses:
        '200':
          description: Estado manual actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EstadoResponse'
components:
  parameters:
    ValorPath:
      name: valor
      in: path
      required: true
      schema:
        type: integer
        format: int32
  schemas:
    WorkshopHealthResponse:
      type: object
      required:
        - estado
        - mensaje
      properties:
        estado:
          type: string
          example: ok
        mensaje:
          type: string
          example: Workshop Spring Boot activo
    SaludoRequest:
      type: object
      required:
        - nombre
      properties:
        nombre:
          type: string
          minLength: 1
    SaludoResponse:
      type: object
      required:
        - mensaje
        - fecha
      properties:
        mensaje:
          type: string
        fecha:
          type: string
          format: date-time
    PrestamoRequest:
      type: object
      required:
        - monto
        - tasaAnual
        - meses
      properties:
        monto:
          type: number
          minimum: 0.01
        tasaAnual:
          type: number
          minimum: 0.01
        meses:
          type: integer
          format: int32
          minimum: 1
          maximum: 360
    PrestamoResponse:
      type: object
      required:
        - cuotaMensual
        - interesTotal
        - totalPagar
      properties:
        cuotaMensual:
          type: number
        interesTotal:
          type: number
        totalPagar:
          type: number
    EstadoResponse:
      type: object
      required:
        - tipo
        - valorActual
      properties:
        tipo:
          type: string
        valorActual:
          type: integer
          format: int32
    ErrorResponse:
      type: object
      properties:
        codigo:
          type: string
        mensaje:
          type: string
        timestamp:
          type: string
          format: date-time
        detalles:
          type: object
          additionalProperties:
            type: string
